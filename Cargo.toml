[package]
name = "vendor-ai-sdk"
version = "0.1.0"
edition = "2024"
description = "Vendor SDK facade for LLM providers. Currently supports OpenAI."
readme = "README.md"
license = "MIT"
repository = "https://github.com/Lume98/vendor-ai-sdk"
keywords = ["openai", "llm", "sdk", "api-client"]
categories = ["api-bindings"]

[dependencies]
bytes = "1"
env_logger = "0.11"
futures = "0.3"
log = "0.4"
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "stream", "rustls-tls"] }
ring = "0.17"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
thiserror = "2"

[dev-dependencies]
